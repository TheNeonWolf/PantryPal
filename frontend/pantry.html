<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pantry | PantryPal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-layout">
        <aside class="sidebar">
            <h1>🥫 PantryPal</h1>

            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="pantry.html" class="active">Pantry</a>
                <a href="shopping.html">Shopping List</a>
                <a href="profile.html">Profile</a>
            </nav>

            <button id="logoutBtn" class="logout-btn">Logout</button>
        </aside>

        <section class="main-content">
            <header class="dashboard-header">
                <div>
                    <h2>My Pantry</h2>
                    <p>View, search, and manage all your food items.</p>
                </div>
            </header>

            <section class="panel">
                <input type="text" id="searchInput" placeholder="Search items...">

                <div id="pantryList" class="items-list">
                    <p class="empty-text">Loading items...</p>
                </div>
            </section>
        </section>
    </main>

    <div id="editItemModal" class="modal hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>✏️ Edit Pantry Item</h2>
                <button id="closeEditModalBtn" class="icon-btn">✕</button>
            </div>

            <form id="editItemForm">
                <input type="hidden" id="editItemId">

                <input type="text" id="editItemName" placeholder="Item name" required>

                <input type="number" id="editItemQuantity" placeholder="Quantity" min="0" required>

                <select id="editItemUnit">
                    <option value="pcs">pcs</option>
                    <option value="g">g</option>
                    <option value="kg">kg</option>
                    <option value="mL">mL</option>
                    <option value="L">L</option>
                    <option value="pack">pack</option>
                    <option value="bottle">bottle</option>
                    <option value="can">can</option>
                    <option value="box">box</option>
                    <option value="bag">bag</option>
                </select>

                <input type="date" id="editItemExpiryDate" required>

                <button type="submit" class="btn full-btn">Save Changes</button>
            </form>

            <p id="editItemMessage" class="message"></p>
        </div>
    </div>

    <div id="lowStockModal" class="modal hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>⚠️ Running Low</h2>
                <button id="closeLowStockModalBtn" class="icon-btn">✕</button>
            </div>

            <p id="lowStockMessage">
                This item is running low. Add it to your shopping list?
            </p>

            <div class="modal-actions">
                <button id="addLowStockToShoppingBtn" class="btn">
                    🛒 Add to Shopping
                </button>

                <button id="dismissLowStockBtn" class="secondary-btn">
                    Not now
                </button>
            </div>
        </div>
    </div>

    <div id="shoppingQuantityModal" class="modal hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>🛒 Add to Shopping List</h2>
                <button id="closeShoppingQuantityModalBtn" class="icon-btn">✕</button>
            </div>
        
            <p id="shoppingQuantityMessage"></p>
        
            <form id="shoppingQuantityForm">
                <input type="number" id="shoppingQuantityInput" min="1" required>
                <button type="submit" class="btn full-btn">Add to List</button>
            </form>
        </div>
    </div>

    <script src="js/pantry.js"></script>
</body>
</html>
